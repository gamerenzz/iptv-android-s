name: iptv_tester
description: A multi-threaded IPTV Speed Tester and Resolution Detector for Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  # 使用官方标准的、含网络解码支持的 FFmpeg 核心
  ffmpeg_kit_flutter: ^6.0.3

flutter:
  uses-material-design: true
