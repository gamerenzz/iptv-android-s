name: iptv_tester
description: A multi-threaded IPTV Speed Tester and Resolution Detector for Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0                    # 用于并发下载和在线状态握手
  path_provider: ^2.1.2           # 用于获取安卓本地缓存目录
  shared_preferences: ^2.2.2      # 用于保存文本框中的历史 URL
  ffmpeg_kit_flutter_min_gpl: ^6.0.3-LTS  # 极为轻量的 FFprobe 替代库，用于检测视频分辨率

flutter:
  uses-material-design: true
