name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Flutter (回归 3.19.x 以原生契合 video_player 插件要求)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.19.x

      - name: Create Project
        run: flutter create --platforms=android iptv_app

      - name: Inject Internet Permission & Copy Files
        run: |
          # 核心：强制注入网络权限以确保 Release 状态下手机能够正常联网
          sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <application/g' iptv_app/android/app/src/main/AndroidManifest.xml
          
          cp pubspec.yaml iptv_app/pubspec.yaml
          mkdir -p iptv_app/lib
          cp lib/main.dart iptv_app/lib/main.dart

      - name: Flutter Pub Get
        run: |
          cd iptv_app
          flutter pub get

      - name: Build APK
        run: |
          cd iptv_app
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iptv-apk
          path: iptv_app/build/app/outputs/flutter-apk/app-release.apk
