name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # 支持人工点击编译

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 设置 Java 运行环境 (Java 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 设置 Flutter 编译环境 (使用极其兼容的经典版 3.13.0)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0'

      - name: 构建无拦截的安卓环境并升级底层 API 限制
        run: |
          # 1. 创建经典版安卓模板
          flutter create --platforms=android --org com.example.iptvtester iptv_app
          
          # 2. 强行拉高安卓应用的最低运行版本到 API 24 (Android 7.0)，这是 FFmpeg 能够成功编译的硬性底线要求
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/g' iptv_app/android/app/build.gradle
          
          # 3. 追加全局仓库源，确保绝对不会出现找不到依赖的情况
          echo -e "\nallprojects {\n    repositories {\n        google()\n        mavenCentral()\n    }\n}" >> iptv_app/android/build.gradle
          
          # 4. 覆盖配置文件和源码
          cp pubspec.yaml iptv_app/pubspec.yaml
          cp lib/main.dart iptv_app/lib/main.dart

      - name: 拉取项目所需要的依赖包
        run: |
          cd iptv_app
          flutter pub get

      - name: 编译并生成 APK（免签名 Release 版）
        run: |
          cd iptv_app
          flutter build apk --release

      - name: 将编译好的 APK 归档并生成下载文件
        uses: actions/upload-artifact@v4
        with:
          name: iptv-tester-app-release
          path: iptv_app/build/app/outputs/flutter-apk/app-release.apk
