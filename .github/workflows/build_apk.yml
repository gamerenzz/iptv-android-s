name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.19.x # 使用新版 Flutter 满足 SDK34 与新插件标准

      - name: Create Project & Patch Custom Maven Whitelist (导入您发现的公共源)
        run: |
          # 1. 创建原生安卓工程
          flutter create --platforms=android --org com.example.iptvtester iptv_app
          
          # 2. 核心修复A：在 settings.gradle 中配置允许项目级自定义仓库，并追加您提供的公共托管源
          sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_PROJECT/g' iptv_app/android/settings.gradle || true
          echo -e "\ndependencyResolutionManagement {\n    repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)\n    repositories {\n        google()\n        mavenCentral()\n        maven { url 'https://artifactory.appodeal.com/appodeal-public/' }\n    }\n}" >> iptv_app/android/settings.gradle
          
          # 3. 核心修复B：向主 build.gradle 末尾注入全局仓库，指定去您找到的 appdeal 镜像源寻找依赖
          echo -e "\nallprojects {\n    repositories {\n        google()\n        mavenCentral()\n        maven { url 'https://artifactory.appodeal.com/appodeal-public/' }\n    }\n}" >> iptv_app/android/build.gradle
          
          # 4. 提权最低安卓SDK要求到 24 (Android 7.0)，满足 FFmpeg 底层运行基线
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/g' iptv_app/android/app/build.gradle
          
          # 5. 强行在原生 Manifest 中注入 INTERNET 网络权限
          sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <application/g' iptv_app/android/app/src/main/AndroidManifest.xml

          # 6. 覆盖配置文件与源码
          cp pubspec.yaml iptv_app/pubspec.yaml
          mkdir -p iptv_app/lib
          cp lib/main.dart iptv_app/lib/main.dart

      - name: Flutter Pub Get
        run: |
          cd iptv_app
          flutter pub get

      - name: Build APK
        run: |
          cd iptv_app
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iptv-apk
          path: iptv_app/build/app/outputs/flutter-apk/app-release.apk
