name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.19.x

      - name: Create Project & Patch Gradle Whitelist (构建双通道依赖解析链)
        run: |
          # 1. 创建安卓原生模板项目
          flutter create --platforms=android --org com.example.iptvtester iptv_app
          
          # 2. 核心修复A：将 settings.gradle 中的 FAIL_ON_PROJECT_REPOS 替换为 PREFER_PROJECT (允许子插件自定义仓库)
          sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_PROJECT/g' iptv_app/android/settings.gradle || true
          
          # 3. 核心修复B：向主 build.gradle 末尾追加全局仓库链 (这一步配合PREFER_PROJECT，彻底打通 FFmpeg 底层 AAR 下载通道)
          echo -e "\nallprojects {\n    repositories {\n        google()\n        mavenCentral()\n    }\n}" >> iptv_app/android/build.gradle
          
          # 4. 提权最低安卓SDK要求到 24，这是 FFmpeg 运行的硬性底线要求
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/g' iptv_app/android/app/build.gradle
          
          # 5. 强行在原生 Manifest 中注入 INTERNET 网络权限
          sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <application/g' iptv_app/android/app/src/main/AndroidManifest.xml

          # 6. 覆盖配置文件与源码
          cp pubspec.yaml iptv_app/pubspec.yaml
          mkdir -p iptv_app/lib
          cp lib/main.dart iptv_app/lib/main.dart

      - name: Flutter Pub Get
        run: |
          cd iptv_app
          flutter pub get

      - name: Build APK
        run: |
          cd iptv_app
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iptv-apk
          path: iptv_app/build/app/outputs/flutter-apk/app-release.apk
