name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # 支持在 GitHub 网页上人工点击“开始编译”

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 设置 Java 运行环境 (Java 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 设置 Flutter 编译环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'

      - name: 在云端自动补全安卓模板、合并代码并强构 Gradle 依赖解析链
        run: |
          # 1. 在云端创建一个名为 iptv_app 的标准安卓空模板项目
          flutter create --platforms=android --org com.example.iptvtester iptv_app
          
          # 2. 仅向原生的 settings.gradle 末尾追加依赖解析器 (PREFER_SETTINGS)
          # 注意：这里改用 >> 追加模式，完美保留 Flutter 自动生成的原本变量（修复 localPropertiesFile 未定义报错）
          echo -e "\ndependencyResolutionManagement {\n    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)\n    repositories {\n        google()\n        mavenCentral()\n    }\n}" >> iptv_app/android/settings.gradle
          
          # 3. 用我们仓库中自定义的 pubspec.yaml 覆盖模板中的配置
          cp pubspec.yaml iptv_app/pubspec.yaml
          
          # 4. 用我们仓库中自定义的 main.dart 覆盖模板中的代码
          cp lib/main.dart iptv_app/lib/main.dart

      - name: 拉取项目所需要的依赖包
        run: |
          cd iptv_app
          flutter pub get

      - name: 编译并生成 APK（免签名 Release 版）
        run: |
          cd iptv_app
          flutter build apk --release

      - name: 将编译好的 APK 归档并生成下载文件
        uses: actions/upload-artifact@v4
        with:
          name: iptv-tester-app-release
          path: iptv_app/build/app/outputs/flutter-apk/app-release.apk
