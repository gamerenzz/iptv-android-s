name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.19.x

      - name: 强行在云端注入本地本地 Maven 缓存 (绕过所有联网阻碍)
        run: |
          # 1. 创建本地 Maven 模拟目录
          mkdir -p /home/runner/.m2/repository/com/arthenica/ffmpeg-kit-https/6.0-2
          mkdir -p /home/runner/.m2/repository/com/arthenica/smart-exception-java/0.2.1
          
          # 2. 直接下载官方 AAR 与配置文件写入本地缓存
          wget -q -O /home/runner/.m2/repository/com/arthenica/ffmpeg-kit-https/6.0-2/ffmpeg-kit-https-6.0-2.aar https://repo1.maven.org/maven2/com/arthenica/ffmpeg-kit-https/6.0-2/ffmpeg-kit-https-6.0-2.aar
          wget -q -O /home/runner/.m2/repository/com/arthenica/ffmpeg-kit-https/6.0-2/ffmpeg-kit-https-6.0-2.pom https://repo1.maven.org/maven2/com/arthenica/ffmpeg-kit-https/6.0-2/ffmpeg-kit-https-6.0-2.pom
          
          # 3. 强行下载 ffmpeg 依赖的辅助包写入本地缓存
          wget -q -O /home/runner/.m2/repository/com/arthenica/smart-exception-java/0.2.1/smart-exception-java-0.2.1.jar https://repo1.maven.org/maven2/com/arthenica/smart-exception-java/0.2.1/smart-exception-java-0.2.1.jar
          wget -q -O /home/runner/.m2/repository/com/arthenica/smart-exception-java/0.2.1/smart-exception-java-0.2.1.pom https://repo1.maven.org/maven2/com/arthenica/smart-exception-java/0.2.1/smart-exception-java-0.2.1.pom

      - name: Create Project & Patch Gradle Whitelist (构建双通道依赖解析)
        run: |
          # 1. 创建安卓原生模板项目
          flutter create --platforms=android --org com.example.iptvtester iptv_app
          
          # 2. 将 settings.gradle 中的 FAIL_ON_PROJECT_REPOS 替换为 PREFER_PROJECT (允许子插件自定义仓库)
          sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_PROJECT/g' iptv_app/android/settings.gradle || true
          
          # 3. 提权最低安卓SDK要求到 24，这是 FFmpeg 运行的硬性底线要求
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/g' iptv_app/android/app/build.gradle
          
          # 4. 在根 build.gradle 补入全局仓库定义，并强行将 mavenLocal() 置于最顶部，让编译引擎绝对优先读取我们刚才下载好的本地缓存！
          echo -e "\nallprojects {\n    repositories {\n        mavenLocal()\n        google()\n        mavenCentral()\n    }\n}" >> iptv_app/android/build.gradle
          
          # 5. 强行在原生 Manifest 中注入 INTERNET 网络权限
          sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <application/g' iptv_app/android/app/src/main/AndroidManifest.xml

          # 6. 覆盖配置文件与源码
          cp pubspec.yaml iptv_app/pubspec.yaml
          mkdir -p iptv_app/lib
          cp lib/main.dart iptv_app/lib/main.dart

      - name: Flutter Pub Get
        run: |
          cd iptv_app
          flutter pub get

      - name: Build APK
        run: |
          cd iptv_app
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iptv-apk
          path: iptv_app/build/app/outputs/flutter-apk/app-release.apk
