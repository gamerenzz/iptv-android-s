name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.16.9

      - name: Create Project
        run: flutter create --platforms=android --org com.example.iptvtester iptv_app

      - name: Inject Kotlin Native Bridge & Copy Files
        run: |
          # 1. 强行在原生 Manifest 中注入 INTERNET 网络权限
          sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <application/g' iptv_app/android/app/src/main/AndroidManifest.xml
          
          # 2. 写入极其健壮的 Kotlin 原生 MediaPlayer 桥接解析通道 (解决 42000 频道在云端的完美编译与分辨率检测)
          mkdir -p iptv_app/android/app/src/main/kotlin/com/example/iptvtester
          cat << 'EOF' > iptv_app/android/app/src/main/kotlin/com/example/iptvtester/MainActivity.kt
          package com.example.iptvtester

          import android.media.MediaPlayer
          import android.os.Handler
          import android.os.Looper
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel

          class MainActivity: FlutterActivity() {
              private val CHANNEL = "com.example.iptvtester/resolution"

              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
                      if (call.method == "getResolution") {
                          val url = call.argument<String>("url")
                          if (url != null) {
                              getVideoResolution(url, result)
                          } else {
                              result.error("BAD_ARGS", "URL is null", null)
                          }
                      } else {
                          result.notImplemented()
                      }
                  }
              }

              private fun getVideoResolution(url: String, result: MethodChannel.Result) {
                  val mediaPlayer = MediaPlayer()
                  var isResponded = false

                  val handler = Handler(Looper.getMainLooper())
                  // 强力防死锁：限制单个系统播放器最大握手时长为 4 秒，超时自动释放，保障并发平滑
                  val timeoutRunnable = Runnable {
                      if (!isResponded) {
                          isResponded = true
                          try {
                              mediaPlayer.release()
                          } catch (e: Exception) {}
                          result.success("未检测")
                      }
                  }
                  handler.postDelayed(timeoutRunnable, 4000)

                  try {
                      mediaPlayer.setDataSource(url)
                      mediaPlayer.setOnPreparedListener {
                          val width = mediaPlayer.videoWidth
                          val height = mediaPlayer.videoHeight
                          if (!isResponded) {
                              isResponded = true
                              handler.removeCallbacks(timeoutRunnable)
                              mediaPlayer.release()
                              if (width > 0 && height > 0) {
                                  result.success("${width}x${height}")
                              } else {
                                  result.success("音频流")
                              }
                          }
                      }
                      mediaPlayer.setOnVideoSizeChangedListener { _, width, height ->
                          if (width > 0 && height > 0 && !isResponded) {
                              isResponded = true
                              handler.removeCallbacks(timeoutRunnable)
                              mediaPlayer.release()
                              result.success("${width}x${height}")
                          }
                      }
                      mediaPlayer.setOnErrorListener { _, _, _ ->
                          if (!isResponded) {
                              isResponded = true
                              handler.removeCallbacks(timeoutRunnable)
                              mediaPlayer.release()
                              result.success("异常")
                          }
                          true
                      }
                      mediaPlayer.prepareAsync()
                  } catch (e: Exception) {
                      if (!isResponded) {
                          isResponded = true
                          handler.removeCallbacks(timeoutRunnable)
                          mediaPlayer.release()
                          result.success("未检测")
                      }
                  }
              }
          }
          EOF

          # 3. 复制前端工程文件
          cp pubspec.yaml iptv_app/pubspec.yaml
          mkdir -p iptv_app/lib
          cp lib/main.dart iptv_app/lib/main.dart

      - name: Flutter Pub Get
        run: |
          cd iptv_app
          flutter pub get

      - name: Build APK
        run: |
          cd iptv_app
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iptv-apk
          path: iptv_app/build/app/outputs/flutter-apk/app-release.apk
